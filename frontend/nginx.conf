server {
  listen 80;
  server_name _;
  client_max_body_size 10M;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

  root /usr/share/nginx/html;
  index index.html;

  # The frontend bundle is built with localhost URLs in this repo.
  # Rewrite them at the edge so the same image works on a real domain.
  sub_filter_once off;
  sub_filter_types text/html text/css text/plain application/javascript application/json;
  sub_filter 'http://localhost:5020' '';

  location = /api {
    return 301 /api/;
  }

  location ^~ /api/ {
    proxy_pass http://backend:5020;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  location = /uploads {
    return 301 /uploads/;
  }

  # Serve generated PDFs and uploaded assets through the same public domain
  location ^~ /uploads/ {
    proxy_pass http://backend:5020;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # React routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # VERY IMPORTANT for SPA: handle unknown routes as index.html
  error_page 404 /index.html;
}
